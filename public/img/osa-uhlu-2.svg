<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="720" height="520" rx="16" fill="url(#bg2)" stroke="#fde68a" stroke-width="2"/>
  
  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#92400e">Konstrukce osy úhlu – krok za krokem</text>
  
  <!-- STEP 1 – Úhel AVB -->
  <rect x="20" y="56" width="160" height="24" rx="6" fill="#b45309" opacity="0.15"/>
  <text x="100" y="73" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">① Narýsuj úhel AVB</text>
  <line x1="40" y1="145" x2="100" y2="80" stroke="#334155" stroke-width="2"/>
  <line x1="40" y1="145" x2="170" y2="120" stroke="#334155" stroke-width="2"/>
  <circle cx="40" cy="145" r="4" fill="#dc2626"/>
  <text x="28" y="158" font-size="12" font-weight="700" fill="#dc2626">V</text>
  <text x="100" y="75" font-size="11" fill="#334155">a</text>
  <text x="175" y="118" font-size="11" fill="#334155">b</text>
  <path d="M 52,133 A 18,18 0 0,1 58,137" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="62" y="128" font-size="11" font-weight="600" fill="#f59e0b">α</text>
  
  <!-- STEP 2 – Oblouk z V (body P, Q) -->
  <rect x="195" y="56" width="160" height="24" rx="6" fill="#2563eb" opacity="0.15"/>
  <text x="275" y="73" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">② Oblouk z V → P, Q</text>
  <line x1="215" y1="155" x2="280" y2="80" stroke="#334155" stroke-width="2"/>
  <line x1="215" y1="155" x2="345" y2="125" stroke="#334155" stroke-width="2"/>
  <circle cx="215" cy="155" r="4" fill="#dc2626"/>
  <text x="203" y="168" font-size="12" font-weight="700" fill="#dc2626">V</text>
  <path d="M 252,90 A 55,55 0 0,1 298,112" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="252" cy="90" r="5" fill="#3b82f6"/>
  <text x="243" y="82" font-size="12" font-weight="700" fill="#3b82f6">P</text>
  <circle cx="298" cy="112" r="5" fill="#3b82f6"/>
  <text x="307" y="108" font-size="12" font-weight="700" fill="#3b82f6">Q</text>
  
  <!-- STEP 3 – Oblouky z P a Q -->
  <rect x="370" y="56" width="165" height="24" rx="6" fill="#0891b2" opacity="0.15"/>
  <text x="452" y="73" text-anchor="middle" font-size="13" font-weight="700" fill="#0891b2">③ Oblouky z P a Q</text>
  <line x1="390" y1="155" x2="455" y2="80" stroke="#334155" stroke-width="2"/>
  <line x1="390" y1="155" x2="525" y2="125" stroke="#334155" stroke-width="2"/>
  <circle cx="390" cy="155" r="4" fill="#dc2626"/>
  <circle cx="428" cy="90" r="4" fill="#3b82f6"/>
  <text x="420" y="82" font-size="11" font-weight="700" fill="#3b82f6">P</text>
  <circle cx="478" cy="112" r="4" fill="#3b82f6"/>
  <text x="487" y="108" font-size="11" font-weight="700" fill="#3b82f6">Q</text>
  <!-- Oblouky z P a Q -->
  <path d="M 445,72 A 35,35 0 0,1 470,82" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="4,3"/>
  <path d="M 470,90 A 35,35 0 0,1 468,82" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="468" cy="82" r="5" fill="#10b981"/>
  <text x="478" y="77" font-size="12" font-weight="700" fill="#10b981">R</text>
  
  <!-- STEP 4 – Spoj VR -->
  <rect x="550" y="56" width="155" height="24" rx="6" fill="#059669" opacity="0.15"/>
  <text x="627" y="73" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">④ Spoj V a R → osa</text>
  <line x1="565" y1="155" x2="630" y2="80" stroke="#334155" stroke-width="2"/>
  <line x1="565" y1="155" x2="700" y2="125" stroke="#334155" stroke-width="2"/>
  <circle cx="565" cy="155" r="4" fill="#dc2626"/>
  <circle cx="645" cy="83" r="4" fill="#10b981"/>
  <text x="654" y="78" font-size="11" font-weight="700" fill="#10b981">R</text>
  <line x1="565" y1="155" x2="645" y2="83" stroke="#10b981" stroke-width="2.5"/>
  <text x="588" y="105" font-size="12" font-weight="700" fill="#10b981" transform="rotate(-47, 588, 105)">osa o</text>
  
  <!-- MAIN DIAGRAM – Full construction -->
  <rect x="40" y="185" width="640" height="320" rx="14" fill="white" stroke="#fde68a" stroke-width="1.5"/>
  <text x="360" y="210" text-anchor="middle" font-size="17" font-weight="700" fill="#92400e">⑤ Výsledek: Osa úhlu – polopřímka VR</text>
  
  <!-- Main angle – rameno a -->
  <line x1="180" y1="440" x2="80" y2="230" stroke="#334155" stroke-width="3"/>
  <text x="65" y="225" font-size="18" font-weight="700" fill="#334155">a</text>
  
  <!-- Main angle – rameno b -->
  <line x1="180" y1="440" x2="600" y2="330" stroke="#334155" stroke-width="3"/>
  <text x="612" y="328" font-size="18" font-weight="700" fill="#334155">b</text>
  
  <!-- Vrchol V -->
  <circle cx="180" cy="440" r="8" fill="#dc2626"/>
  <text x="157" y="460" font-size="20" font-weight="700" fill="#dc2626">V</text>
  
  <!-- Úhel oblouk α -->
  <path d="M 158,408 A 45,45 0 0,1 222,420" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <text x="210" y="405" font-size="20" font-weight="700" fill="#f59e0b">α</text>
  
  <!-- Oblouk z V protínající ramena -->
  <path d="M 130,290 A 170,170 0 0,1 420,370" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8,5" opacity="0.4"/>
  
  <!-- Body P a Q na ramenech -->
  <circle cx="130" cy="334" r="7" fill="#3b82f6"/>
  <text x="112" y="328" font-size="16" font-weight="700" fill="#3b82f6">P</text>
  <circle cx="400" cy="370" r="7" fill="#3b82f6"/>
  <text x="412" y="365" font-size="16" font-weight="700" fill="#3b82f6">Q</text>
  
  <!-- Oblouky z P a Q -->
  <path d="M 170,280 A 100,100 0 0,1 260,270" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <path d="M 330,310 A 100,100 0 0,1 260,270" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  
  <!-- Bod R -->
  <circle cx="280" cy="280" r="8" fill="#10b981"/>
  <text x="295" y="275" font-size="16" font-weight="700" fill="#10b981">R</text>
  
  <!-- Osa úhlu VR -->
  <line x1="180" y1="440" x2="380" y2="120" stroke="#10b981" stroke-width="3.5" stroke-dasharray="0"/>
  <text x="395" y="118" font-size="18" font-weight="700" fill="#10b981">osa o</text>
  
  <!-- Půlení α/2 + α/2 -->
  <path d="M 158,408 A 45,45 0 0,1 190,405" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="162" y="393" font-size="14" font-weight="600" fill="#10b981">α/2</text>
  <path d="M 190,405 A 45,45 0 0,1 222,420" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="222" y="395" font-size="14" font-weight="600" fill="#10b981">α/2</text>
  
  <!-- Bod X na ose s kolmicemi -->
  <circle cx="310" cy="232" r="6" fill="#8b5cf6"/>
  <text x="322" y="228" font-size="15" font-weight="700" fill="#8b5cf6">X</text>
  <line x1="310" y1="232" x2="188" y2="283" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="310" y1="232" x2="395" y2="340" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="230" y="250" font-size="12" font-weight="600" fill="#8b5cf6">d</text>
  <text x="360" y="278" font-size="12" font-weight="600" fill="#8b5cf6">d</text>
</svg>
