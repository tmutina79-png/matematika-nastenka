<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dva vysílače – průsečíky kružnic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
    }
    canvas { max-width: 100%; max-height: 100vh; }
  </style>
</head>
<body>
  <canvas id="canvas" width="1280" height="720"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    const DURATION = 20000;
    let startTime = null;

    const c = {
      bg1: '#0f172a', bg2: '#1e293b',
      blue: '#60a5fa', green: '#34d399', red: '#f87171',
      yellow: '#fbbf24', purple: '#818cf8',
      text: '#e2e8f0', dim: '#94a3b8'
    };

    function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
    function lerp(a, b, t) { return a + (b - a) * Math.min(1, Math.max(0, t)); }

    // Geometry: scale 1 km = 40 px
    const S = 40;
    const Ax = W/2 - 6*S, Ay = H/2 + 20;
    const Bx = W/2 + 6*S, By = H/2 + 20;
    const rA = 8*S, rB = 6*S;

    // Compute intersection points analytically
    const d = 12*S;
    const x_int = (d*d + rA*rA - rB*rB) / (2*d);
    const y_int = Math.sqrt(rA*rA - x_int*x_int);
    const X1x = Ax + x_int, X1y = Ay - y_int;
    const X2x = Ax + x_int, X2y = Ay + y_int;

    function drawBg() {
      const g = ctx.createLinearGradient(0, 0, W, H);
      g.addColorStop(0, c.bg1); g.addColorStop(1, c.bg2);
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    }

    function drawTitle(alpha) {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = c.text; ctx.font = 'bold 36px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('Dva vysílače – průsečíky kružnic', W/2, 55);
      ctx.font = '18px system-ui'; ctx.fillStyle = c.dim;
      ctx.fillText('|AB| = 12 km, dosah A = 8 km, dosah B = 6 km', W/2, 85);
      ctx.globalAlpha = 1;
    }

    function drawPoint(x, y, r, color, label, labelDx, labelDy) {
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
      ctx.fillStyle = color; ctx.fill();
      if (label) {
        ctx.font = 'bold 20px system-ui'; ctx.fillStyle = color;
        ctx.textAlign = 'center';
        ctx.fillText(label, x + (labelDx||0), y + (labelDy||-20));
      }
    }

    function drawSegmentAB(alpha) {
      ctx.globalAlpha = alpha;
      ctx.beginPath(); ctx.moveTo(Ax, Ay); ctx.lineTo(Bx, By);
      ctx.strokeStyle = c.dim; ctx.lineWidth = 2;
      ctx.setLineDash([8, 4]); ctx.stroke(); ctx.setLineDash([]);
      ctx.font = '16px system-ui'; ctx.fillStyle = c.dim; ctx.textAlign = 'center';
      ctx.fillText('12 km', (Ax+Bx)/2, Ay - 12);
      ctx.globalAlpha = 1;
    }

    function drawCircle(cx, cy, r, color, alpha, progress) {
      if (progress <= 0) return;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + Math.PI*2*Math.min(1, progress));
      ctx.strokeStyle = color; ctx.lineWidth = 3;
      ctx.setLineDash([6, 3]); ctx.stroke(); ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }

    function drawRadius(cx, cy, r, angle, color, alpha, label) {
      ctx.globalAlpha = alpha;
      const ex = cx + r * Math.cos(angle), ey = cy + r * Math.sin(angle);
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(ex, ey);
      ctx.strokeStyle = color; ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]);
      if (label) {
        const mx = (cx+ex)/2, my = (cy+ey)/2;
        ctx.font = '15px system-ui'; ctx.fillStyle = color; ctx.textAlign = 'center';
        ctx.fillText(label, mx + 15, my - 8);
      }
      ctx.globalAlpha = 1;
    }

    function drawIntersections(alpha) {
      if (alpha <= 0) return;
      ctx.globalAlpha = alpha;
      // Glow
      [X1x, X1y, X2x, X2y].forEach((_, i) => {
        if (i % 2 === 0) {
          const px = [X1x, X1y, X2x, X2y][i];
          const py = [X1x, X1y, X2x, X2y][i+1];
          const glow = ctx.createRadialGradient(px, py, 0, px, py, 30);
          glow.addColorStop(0, 'rgba(248,113,113,0.5)');
          glow.addColorStop(1, 'rgba(248,113,113,0)');
          ctx.fillStyle = glow;
          ctx.fillRect(px-30, py-30, 60, 60);
        }
      });
      drawPoint(X1x, X1y, 8, c.red, 'X₁', 25, -10);
      drawPoint(X2x, X2y, 8, c.red, 'X₂', 25, 25);
      ctx.globalAlpha = 1;
    }

    function drawLabels(alpha) {
      ctx.globalAlpha = alpha;
      ctx.font = '16px system-ui'; ctx.textAlign = 'left';
      ctx.fillStyle = c.blue;
      ctx.fillText('k₁(A, 8 km)', Ax - rA - 10, Ay - rA + 30);
      ctx.fillStyle = c.green;
      ctx.fillText('k₂(B, 6 km)', Bx + rB - 60, By - rB + 30);
      ctx.globalAlpha = 1;
    }

    function drawExplanation(alpha) {
      ctx.globalAlpha = alpha;
      ctx.font = '18px system-ui'; ctx.fillStyle = c.yellow; ctx.textAlign = 'center';
      ctx.fillText('Průsečíky X₁ a X₂ = body kde se signály setkávají', W/2, H - 50);
      ctx.font = '15px system-ui'; ctx.fillStyle = c.dim;
      ctx.fillText('Stejný princip využívá GPS lokalizace', W/2, H - 25);
      ctx.globalAlpha = 1;
    }

    function drawFillAreas(alphaA, alphaB) {
      // Fill circle A
      if (alphaA > 0) {
        ctx.globalAlpha = alphaA * 0.08;
        ctx.beginPath(); ctx.arc(Ax, Ay, rA, 0, Math.PI*2);
        ctx.fillStyle = c.blue; ctx.fill();
        ctx.globalAlpha = 1;
      }
      // Fill circle B
      if (alphaB > 0) {
        ctx.globalAlpha = alphaB * 0.08;
        ctx.beginPath(); ctx.arc(Bx, By, rB, 0, Math.PI*2);
        ctx.fillStyle = c.green; ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function frame(ts) {
      if (!startTime) startTime = ts;
      const t = ((ts - startTime) % DURATION) / DURATION;

      drawBg();

      // Timeline:
      // 0.00–0.10: Title + points A, B + segment AB fade in
      // 0.10–0.30: Circle k₁ draws
      // 0.25–0.45: Circle k₂ draws
      // 0.40–0.50: Fills appear
      // 0.45–0.55: Radii appear
      // 0.55–0.65: Labels appear
      // 0.60–0.75: Intersection points appear with glow
      // 0.75–0.90: Explanation text
      // 0.90–1.00: Hold / fade

      const titleA = ease(lerp(0, 1, (t - 0) / 0.08));
      const segA = ease(lerp(0, 1, (t - 0.05) / 0.05));
      const c1prog = lerp(0, 1, (t - 0.10) / 0.20);
      const c2prog = lerp(0, 1, (t - 0.25) / 0.20);
      const fillA = ease(lerp(0, 1, (t - 0.40) / 0.08));
      const fillB = ease(lerp(0, 1, (t - 0.42) / 0.08));
      const radA = ease(lerp(0, 1, (t - 0.45) / 0.06));
      const labA = ease(lerp(0, 1, (t - 0.55) / 0.06));
      const intA = ease(lerp(0, 1, (t - 0.62) / 0.08));
      const expA = ease(lerp(0, 1, (t - 0.75) / 0.08));

      // Fade out near end
      const fadeOut = t > 0.92 ? ease(1 - (t - 0.92) / 0.08) : 1;

      ctx.save();
      ctx.globalAlpha = fadeOut;

      drawTitle(titleA);
      drawSegmentAB(segA);

      drawFillAreas(fillA, fillB);

      drawCircle(Ax, Ay, rA, c.blue, Math.min(1, c1prog > 0 ? 0.9 : 0), c1prog);
      drawCircle(Bx, By, rB, c.green, Math.min(1, c2prog > 0 ? 0.9 : 0), c2prog);

      drawRadius(Ax, Ay, rA, -Math.PI * 0.15, c.blue, radA, '8 km');
      drawRadius(Bx, By, rB, -Math.PI * 0.85, c.green, radA, '6 km');

      // Points A, B
      if (segA > 0) {
        ctx.globalAlpha = segA * fadeOut;
        drawPoint(Ax, Ay, 7, c.blue, 'A', 0, 30);
        drawPoint(Bx, By, 7, c.green, 'B', 0, 30);
        ctx.globalAlpha = fadeOut;
      }

      drawLabels(labA);
      drawIntersections(intA);
      drawExplanation(expA);

      ctx.restore();
      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
